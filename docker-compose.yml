version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: poultry-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-poultrymitra}
      POSTGRES_USER: ${DB_USER:-poultry}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_this_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-poultry}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  api:
    build: 
      context: ./server
      dockerfile: Dockerfile
    container_name: poultry-api
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${API_PORT:-3000}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-poultrymitra}
      DB_USER: ${DB_USER:-poultry}
      DB_PASSWORD: ${DB_PASSWORD:-change_this_password}
      JWT_SECRET: ${JWT_SECRET:-change_this_secret_key}
      OLLAMA_HOST: ${OLLAMA_HOST:-http://host.docker.internal:11434}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    volumes:
      - ./server:/app
      - /app/node_modules

  # Frontend (Vite dev server)
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: poultry-web
    restart: unless-stopped
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
    depends_on:
      - api
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app
      - /app/node_modules

  # PgAdmin (Database Management)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: poultry-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@poultrymitra.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin123}
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
  pgadmin_data:

networks:
  default:
    name: poultry-network